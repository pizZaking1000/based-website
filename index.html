<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pizZa king</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0d0d0f;
    --surface:   #16161a;
    --border:    #2a2a30;
    --accent:    #60d0f0;
    --accent2:   #60d0f0;
    --text:      #e8e8ee;
    --muted:     #6b6b7a;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Mono', monospace;
    --radius:    12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    animation: fadeUp .6s ease both;
  }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 40%, transparent);
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp .6s ease both;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    transition: border-color .2s, background .2s, transform .15s;
    cursor: pointer;
  }
  .link-btn:hover {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 6%, var(--bg));
    transform: translateX(4px);
  }
  .link-btn:hover .link-icon { color: var(--accent); }

  .link-icon {
    font-size: 18px;
    width: 22px;
    text-align: center;
    transition: color .2s;
    color: var(--muted);
  }
  .link-label { flex: 1; }
  .link-arrow {
    font-size: 12px;
    color: var(--muted);
    transition: color .2s;
  }
  .link-btn:hover .link-arrow { color: var(--accent); }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
    animation: fadeUp .6s .3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section:nth-child(1) { animation-delay: .05s; }
  .section:nth-child(2) { animation-delay: .12s; }
</style>
</head>
